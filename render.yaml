services:
  - type: web
    name: poke-dispatch-mcp
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python src/server.py
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: RENDER
        value: "true"
      - key: PYTHON_VERSION
        value: "3.12.0"
